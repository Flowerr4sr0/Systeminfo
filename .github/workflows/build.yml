name: Build EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --console sysinfo.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: sysinfo-exe
          path: dist/sysinfo.exe
